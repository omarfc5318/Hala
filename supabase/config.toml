# supabase/config.toml — Local development configuration
# Mirrors the production auth settings from Appendix A.
# Run `supabase start` to spin up the local stack.

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 15
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
heartbeat_interval_ms = 30000
max_events_per_second = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "5MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
port = 54321
site_url = "https://hala.app"
additional_redirect_urls = ["hala://auth/callback", "http://localhost:8081"]

jwt_expiry = 3600

# Refresh token rotation
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# Security
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.rate_limit]
# Max failed login attempts before lockout
email_sent = 5

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m0s"

[auth.sms]
enable_signup = true
enable_confirmations = true
max_frequency = "1m0s"

[auth.sms.twilio]
# Set via `supabase secrets set` — never hardcode
account_sid = ""
message_service_sid = ""
auth_token = "env(TWILIO_AUTH_TOKEN)"

[auth.external.apple]
enabled = false

[auth.external.google]
enabled = false

[analytics]
enabled = false
port = 54327

[functions]
# Edge Functions inherit SUPABASE_URL and SUPABASE_ANON_KEY automatically.
# Additional secrets: supabase secrets set EXPO_PUBLIC_SENTRY_DSN=...
