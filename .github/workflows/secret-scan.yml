name: Secret Scan

# Runs on every push and PR — catches secrets before they land in git history.
# Gitleaks scans the full commit range (not just the diff) so squashed commits
# are also covered.
#
# Configuration: add a .gitleaks.toml to the repo root to extend / override
# the default ruleset (e.g. to allowlist test fixtures or known-safe patterns).

on:
  push:
  pull_request:

jobs:
  scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan all commits in the push range
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional: uncomment to post inline PR annotations for each finding
          # GITLEAKS_ENABLE_COMMENTS: true
