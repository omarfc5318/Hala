name: Deploy Staging

# Triggers on every push to the staging branch.
# EAS Update publishes an OTA (over-the-air) JavaScript bundle — no app store
# submission required. Devices already running the staging build will pick up
# the update automatically on next launch.
#
# Prerequisites (set in GitHub → Settings → Secrets):
#   EXPO_TOKEN  — personal access token from expo.dev/accounts/<user>/settings/access-tokens

on:
  push:
    branches: [staging]

jobs:
  deploy:
    name: EAS Update → staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install --global eas-cli

      - name: Publish OTA update
        run: >
          eas update
          --branch staging
          --message "Auto deploy ${{ github.sha }}"
          --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          EXPO_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
